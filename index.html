<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Library</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <h1>The Library</h1>
        </div>
        <div class="header-meta">
          <span id="book-count">0 books</span>
          <button id="new-book-btn">+ Add Book</button>
        </div>
      </div>
    </header>

    <main>
      <div id="library-grid"></div>
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">◈</div>
        <p>Your shelves are bare.<br />Add a book to begin.</p>
      </div>
    </main>

    <dialog id="book-dialog">
      <div class="dialog-inner">
        <header class="dialog-header">
          <h2>New Book</h2>
          <button class="dialog-close" id="dialog-close">✕</button>
        </header>
        <form id="book-form" novalidate>
          <div class="field">
            <label for="title">Title</label>
            <input
              type="text"
              id="title"
              name="title"
              placeholder="Book title"
              required
            />
          </div>
          <div class="field">
            <label for="author">Author</label>
            <input
              type="text"
              id="author"
              name="author"
              placeholder="Author name"
              required
            />
          </div>
          <div class="field">
            <label for="pages">Pages</label>
            <input
              type="number"
              id="pages"
              name="pages"
              placeholder="Number of pages"
              min="1"
              required
            />
          </div>
          <div class="field field-check">
            <label class="check-label">
              <input type="checkbox" id="read" name="read" />
              <span class="checkmark"></span>
              Already read
            </label>
          </div>
          <div class="form-actions">
            <button type="button" id="cancel-btn">Cancel</button>
            <button type="submit">Add to Library</button>
          </div>
        </form>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
